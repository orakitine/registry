default_dirs:
  skills:
    - default: .claude/skills/
    - global: ~/.claude/skills/
  agents:
    - default: .claude/agents/
    - global: ~/.claude/agents/
  prompts:
    - default: .claude/commands/
    - global: ~/.claude/commands/

registry:
  skills:
    - name: browser
      description: Headless browser automation via playwright-cli for testing, screenshots, scraping, and parallel sessions. Use for UI testing, web scraping, screenshot capture, or any browser-based workflow.
      source: https://github.com/orakitine/toolbox/blob/main/skills/browser/SKILL.md

    - name: browser-microscope
      description: Real-browser DOM and layout forensics — the desktop-Playwright counterpart to ios-simulator-microscope. Runs arbitrary JS in a live page, hit-tests why a click won't land (elementFromPoint), dumps scroll/box geometry, reads live CSS custom-property tokens via getComputedStyle, and sweeps viewport widths to find breakpoint/container-query thresholds. Drives the local Playwright npm package (no global CLI required); supports HTTP basic-auth and self-signed staging certs. Use when a click won't register, an element is overlapped/clipped/off-screen, scroll geometry looks wrong, z-index/stacking is suspect, or a layout bug only appears at certain widths. The layout-forensics complement to the journey-walking browser and browser-qa skills.
      source: https://github.com/orakitine/toolbox/blob/main/skills/browser-microscope/SKILL.md

    - name: browser-review
      description: Parallel UI validation that discovers user stories from YAML files, fans out browser-qa agents, and aggregates pass/fail results with screenshots. Use for acceptance testing or regression testing.
      source: https://github.com/orakitine/toolbox/blob/main/skills/browser-review/SKILL.md
      requires: [skill:browser, agent:browser-qa]

    - name: browser-workflow
      description: Executes saved browser automation workflows with consistent setup, teardown, and reporting. Use for repeatable browser automations like scraping, form-filling, or monitoring.
      source: https://github.com/orakitine/toolbox/blob/main/skills/browser-workflow/SKILL.md
      requires: [skill:browser]

    - name: caveman
      description: Ultra-compressed communication mode. Cuts token usage ~75% by dropping filler, articles, and pleasantries while keeping full technical accuracy. Use when user wants terse responses or invokes /caveman.
      source: https://github.com/orakitine/toolbox/blob/main/skills/caveman/SKILL.md

    - name: diagnose
      description: Disciplined diagnosis loop for hard bugs and performance regressions. Reproduce, hypothesise, instrument, fix, regression-test. Use when reporting a bug, debugging broken/flaky behavior, or chasing a performance regression.
      source: https://github.com/orakitine/toolbox/blob/main/skills/diagnose/SKILL.md

    - name: doc-cache
      description: Transparent read-through cache for documentation lookups. Checks cache before WebFetch, caches results with expiration, garbage collects stale entries. Use automatically when fetching docs, API references, or technical documentation.
      source: https://github.com/orakitine/toolbox/blob/main/skills/doc-cache/SKILL.md

    - name: elevenlabs
      description: Text-to-speech, multi-voice dialogue, custom voice design, sound effects, music generation, and audio processing using the ElevenLabs API via bundled Python CLI. Use for voice generation, character voices, designing new voices, expressive narration with audio tags, audio content creation, or sound design.
      source: https://github.com/orakitine/toolbox/blob/main/skills/elevenlabs/SKILL.md

    - name: gen-image
      description: Generate or edit images using AI image models. Currently supports Google Gemini (Nano Banana Pro for creation, Nano Banana for editing). Provider-agnostic design. Use for image generation, visual content creation, or image editing tasks.
      source: https://github.com/orakitine/toolbox/blob/main/skills/gen-image/SKILL.md

    - name: grill-me
      description: Relentless interview mode for stress-testing a plan or design. Walks every branch of the decision tree one question at a time, each with a recommended answer. Use when wanting to be grilled on a plan, stress-test a design, or poke holes in a decision.
      source: https://github.com/orakitine/toolbox/blob/main/skills/grill-me/SKILL.md

    - name: grill-with-docs
      description: Grilling session that maintains CONTEXT.md (project glossary) and docs/adr/ (architecture decision records) inline as decisions crystallize. Use when stress-testing a design while building up the project's shared language.
      source: https://github.com/orakitine/toolbox/blob/main/skills/grill-with-docs/SKILL.md

    - name: handoff
      description: Compacts the current conversation into a handoff doc (saved to OS temp dir) so another agent can continue the work. Redacts secrets, references external artifacts instead of duplicating them. Use when wrapping a session for the next one.
      source: https://github.com/orakitine/toolbox/blob/main/skills/handoff/SKILL.md

    - name: improve-codebase-architecture
      description: Finds deepening opportunities (Ousterhout) in a codebase, informed by CONTEXT.md and docs/adr/. Produces an HTML architecture review with diagrams. Use periodically to rescue codebases drifting toward ball-of-mud.
      source: https://github.com/orakitine/toolbox/blob/main/skills/improve-codebase-architecture/SKILL.md
      requires: [skill:grill-with-docs]

    - name: ios-simulator-microscope
      description: Reproduce and measure iOS-Safari-only layout, rendering, and interaction bugs on a booted iOS Simulator (iPad/iPhone) — the real-device counterpart to browser-microscope. Two modes — safaridriver + xcrun simctl for static measurement (inject JS, read live geometry/viewport units, screenshot), and a session-free reverse-proxy bridge (sim-bridge.mjs) for gesture work, since CGEvent drags raise Safari's automation lock during a WebDriver session; toolbar-collapse dynamics run through the bridge. Includes a preflight doctor (macOS-only; checks Xcode, safaridriver, Node, Swift, Accessibility). Use when a bug only shows in real iOS Safari and not in Playwright/Chromium/jsdom.
      source: https://github.com/orakitine/toolbox/blob/main/skills/ios-simulator-microscope/SKILL.md

    - name: living-plan
      description: Authors and maintains a living, executable engineering plan as Markdown in docs/plans/ (create/update/build). Fixed goal (Purpose + Definition of Done), living path (4-state status checklist, append-only amendments, cross-agent metadata). Reads CONTEXT.md, links docs/adr/ (never writes ADRs), and build delegates implementation to tdd. Use to plan, spec, or design work, or to build an existing plan.
      source: https://github.com/orakitine/toolbox/blob/main/skills/living-plan/SKILL.md

    - name: menu-app
      description: Convert a restaurant menu (PDF, image, Word, HTML, Markdown) into a self-contained single-page HTML ordering app with search, filters, cart, and copy-to-clipboard order text. Use when given a menu file to turn into an interactive ordering tool.
      source: https://github.com/orakitine/toolbox/blob/main/skills/menu-app/SKILL.md

    - name: fork-terminal
      description: Fork a terminal session to a new window with a command or agentic coding tool (Claude Code, Codex CLI, Gemini CLI). Supports context handoff. Use when the user requests fork terminal, new terminal, or fork session.
      source: https://github.com/orakitine/toolbox/blob/main/skills/fork-terminal/SKILL.md

    - name: speak
      description: Provider-agnostic text-to-speech output. Converts text to audio and plays it immediately. Falls back through available TTS providers (elevenlabs, macOS say). Use as a composable voice output primitive from any skill, agent, or workflow.
      source: https://github.com/orakitine/toolbox/blob/main/skills/speak/SKILL.md
      requires: [skill:elevenlabs]

    - name: setup-toolbox-context
      description: Scaffolds CONTEXT.md (project glossary) and docs/adr/ lazily — only creating files when there's real content. Use before first use of grill-with-docs or improve-codebase-architecture to bootstrap the domain-documentation convention.
      source: https://github.com/orakitine/toolbox/blob/main/skills/setup-toolbox-context/SKILL.md
      requires: [skill:grill-with-docs]

    - name: skill-forge
      description: Creates, evaluates, and refines agent skills following the agentskills.io specification. Use when building new skills from scratch, auditing existing skills for quality, or cleaning up skill structure and naming. Produces portable skills that work across any compliant agent harness.
      source: https://github.com/orakitine/toolbox/blob/main/skills/skill-forge/SKILL.md

    - name: skill-guide
      description: Discovers and explains installed skills and agents. Lists what's available, shows how to use them, explains families and dependencies. Use when asking what skills exist, how to use a skill, or what tools are available.
      source: https://github.com/orakitine/toolbox/blob/main/skills/skill-guide/SKILL.md

    - name: tdd
      description: Test-driven development with red-green-refactor loop and vertical-slice tracer bullets. Calls out the horizontal-slice anti-pattern. Use when building features or fixing bugs test-first.
      source: https://github.com/orakitine/toolbox/blob/main/skills/tdd/SKILL.md

    - name: zoom-out
      description: Pulls the agent up a layer of abstraction and maps the relevant modules and callers around the code in focus, using the project's domain glossary vocabulary. Use when unfamiliar with a section of code.
      source: https://github.com/orakitine/toolbox/blob/main/skills/zoom-out/SKILL.md
  agents:
    - name: browser-operator
      description: General-purpose browser automation agent for headless browsing, screenshots, scraping, and parallel sessions. Use when spawning browser tasks as subagents.
      source: https://github.com/orakitine/toolbox/blob/main/agents/browser-operator.md
      requires: [skill:browser]

    - name: browser-qa
      description: UI validation agent that executes user stories against web apps and reports structured pass/fail results with screenshots. Use for QA, acceptance testing, or UI verification.
      source: https://github.com/orakitine/toolbox/blob/main/agents/browser-qa.md
      requires: [skill:browser]

    - name: gen-image-operator
      description: Image generation and editing agent using Gemini/Imagen APIs. Use for creating images from text prompts, editing existing images, or batch image generation. Supports parallel instances.
      source: https://github.com/orakitine/toolbox/blob/main/agents/gen-image-operator.md
      requires: [skill:gen-image]

    - name: elevenlabs-operator
      description: Audio generation agent using ElevenLabs API. Use for text-to-speech, sound effects, music generation, audio isolation, or stem separation. Supports parallel instances.
      source: https://github.com/orakitine/toolbox/blob/main/agents/elevenlabs-operator.md
      requires: [skill:elevenlabs]

    - name: speak-narrator
      description: Narration agent that digests content into engaging spoken summaries and delivers them via the speak skill. Reshapes raw output into listener-friendly narration. Use when output should be heard, not read.
      source: https://github.com/orakitine/toolbox/blob/main/agents/speak-narrator.md
      requires: [skill:speak]

    - name: elevenlabs-voice-designer
      description: Voice casting agent that searches the ElevenLabs voice library, matches characters to voices, and generates audition samples with structured recommendations.
      source: https://github.com/orakitine/toolbox/blob/main/agents/elevenlabs-voice-designer.md
      requires: [skill:elevenlabs]
  prompts: []
